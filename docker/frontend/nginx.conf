# ──────────────────────────────────────────────────────
# Nginx config for HR Training Advisor SPA + API proxy
# ──────────────────────────────────────────────────────

# Gzip compression
gzip              on;
gzip_vary         on;
gzip_proxied      any;
gzip_comp_level   6;
gzip_min_length   256;
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/xml
    application/rss+xml
    image/svg+xml;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"    always;
    add_header X-Content-Type-Options "nosniff"        always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://api.anthropic.com; frame-ancestors 'self';" always;

    # ── API reverse proxy to Express backend ────────
    location /api/ {
        proxy_pass         http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # 60s timeout for Claude API calls
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ── Health check proxy ──────────────────────────
    location /health {
        proxy_pass http://backend:3001;
    }

    # ── Vite hashed assets: aggressive caching ──────
    location /assets/ {
        expires    1y;
        add_header Cache-Control "public, immutable" always;
        access_log off;
    }

    # ── App shell: always revalidate ────────────────
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma        "no-cache"                            always;
        add_header Expires        "0"                                  always;
    }

    # ── SPA fallback ────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
