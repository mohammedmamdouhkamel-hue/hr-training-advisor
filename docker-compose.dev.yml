# ──────────────────────────────────────────────────
# Development: docker compose -f docker-compose.dev.yml up --build
# ──────────────────────────────────────────────────

services:
  # ── Vite dev server with HMR ──────────────────
  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npx vite --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    depends_on:
      - backend
    networks:
      - app-network

  # ── Express backend with auto-restart ─────────
  backend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && node --watch server.js"
    expose:
      - "3001"
    ports:
      - "3001:3001"
    volumes:
      - ./docker/backend:/app
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - RATE_LIMIT_RPM=${RATE_LIMIT_RPM:-20}
      - PORT=3001
      - CORS_ENABLED=true
      - NODE_ENV=development
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
