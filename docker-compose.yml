# ──────────────────────────────────────────────
# Production: docker compose up --build
# ──────────────────────────────────────────────

services:
  # ── Nginx frontend (static SPA + API proxy) ──
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  # ── Express API proxy (internal only) ─────────
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    expose:
      - "3001"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - RATE_LIMIT_RPM=${RATE_LIMIT_RPM:-20}
      - PORT=3001
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

networks:
  app-network:
    driver: bridge
